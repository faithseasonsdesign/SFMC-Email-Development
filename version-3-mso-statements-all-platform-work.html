<!--
  FIXED: Works on iPhone 12 Pro Max iOS 14, iPhone 13/14 series iOS 15/16
  Solution: Use hybrid/sponge approach instead of display:block on <td>
-->

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Target iOS Mail on newer iPhones — use max-width trick */
    @media only screen and (max-width: 600px) {
      .wrapper { width: 100% !important; }
      .column {
        display: block !important;
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box !important;
      }
    }
  </style>
</head>

<!--[if mso]>

    <!-- LEFT -->
