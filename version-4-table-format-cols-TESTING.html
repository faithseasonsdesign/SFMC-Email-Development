<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @media only screen and (max-width: 600px) {
      .column {
        display: block !important;
        width: 100% !important;
        max-width: 100% !important;
      }
    }
  </style>
</head>

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" align="center" style="max-width: 640;">
  
  <tr>
    <td>

      <!-- LEFT -->
      <table
        role="presentation"
        class="column"
        cellspacing="0"
        cellpadding="0"
        align="left"
        width="300"
        style="display:inline-block; vertical-align:top; width:100%; max-width:300px; background-color:orange;"
      >
        <tr>
          <td style="padding:10px;">Left content</td>
        </tr>
      </table>

      <!-- RIGHT -->
      <table
        role="presentation"
        class="column"
        cellspacing="0"
        cellpadding="0"
        align="left"
        width="300"
        style="display:inline-block; vertical-align:top; width:100%; max-width:300px; background-color:red;"
      >
        <tr>
          <td style="padding:10px;">Right content</td>
        </tr>
      </table>

    </td>
  </tr>
</table>
